name: Apply Terraform (Render infra)

on:
  push:
    branches: [ main ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.7

      - name: Configure AWS credentials (no-op placeholder)
        run: echo "no-op"

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Plan
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          terraform -chdir=terraform plan -out=tfplan \
            -var="render_api_key=${{ secrets.RENDER_API_KEY }}" \
            -var="render_owner_id=${{ secrets.RENDER_OWNER_ID }}" \
            -var="github_actor=${{ github.actor }}"

      - name: Terraform Apply
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="render_api_key=${{ secrets.RENDER_API_KEY }}" \
            -var="render_owner_id=${{ secrets.RENDER_OWNER_ID }}" \
            -var="github_actor=${{ github.actor }}"
